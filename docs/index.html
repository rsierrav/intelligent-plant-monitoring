<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Plant Moisture Dashboard</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/luxon@3"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-luxon"></script>
  </head>

  <body>
    <!-- Status Bar -->
    <div class="status-bar">
      <div class="status-indicator">
        <span id="statusIndicator" class="indicator-dot live"></span>
        <span id="statusText">Live</span>
      </div>
      <div id="lastUpdated" class="last-updated">Last updated: --</div>
    </div>

    <div class="header">
      <h1>Plant Moisture Dashboard</h1>

      <div class="controls">
        <button onclick="load()">Refresh Data</button>

        <label class="switch">
          <input type="checkbox" id="themeToggle" />
          <span class="slider"></span>
        </label>
      </div>
    </div>

    <div class="section">
      <h2>Live Sensor Data + Prediction</h2>

      <div class="cards">
        <div class="card">
          <h3>Plant A</h3>
          <div class="sensor-grid">
            <div class="sensor-item">
              <div class="sensor-label">Moisture</div>
              <div class="value" id="valueA">--%</div>
            </div>
            <div class="sensor-item">
              <div class="sensor-label">Light</div>
              <div class="sensor-value" id="lightA">-- lux</div>
            </div>
            <div class="sensor-item">
              <div class="sensor-label">Temp</div>
              <div class="sensor-value" id="tempA">-- °C</div>
            </div>
            <div class="sensor-item">
              <div class="sensor-label">Humidity</div>
              <div class="sensor-value" id="humidityA">-- %</div>
            </div>
          </div>
          <div class="badge" id="statusA">--</div>
          <div class="meta" id="etaA"></div>
        </div>

        <div class="card">
          <h3>Plant B</h3>
          <div class="sensor-grid">
            <div class="sensor-item">
              <div class="sensor-label">Moisture</div>
              <div class="value" id="valueB">--%</div>
            </div>
            <div class="sensor-item">
              <div class="sensor-label">Light</div>
              <div class="sensor-value" id="lightB">-- lux</div>
            </div>
            <div class="sensor-item">
              <div class="sensor-label">Temp</div>
              <div class="sensor-value" id="tempB">-- °C</div>
            </div>
            <div class="sensor-item">
              <div class="sensor-label">Humidity</div>
              <div class="sensor-value" id="humidityB">-- %</div>
            </div>
          </div>
          <div class="badge" id="statusB">--</div>
          <div class="meta" id="etaB"></div>
        </div>
      </div>
    </div>

    <div class="section">
      <h2>Forecast</h2>
      <div class="forecast-text" id="forecastText"></div>
      <canvas id="chart"></canvas>
    </div>

    <script src="app.js"></script>
  </body>
</html>
